<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haviz — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { background: #161b22; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; }
  header h1 { font-size: 16px; color: #58a6ff; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .status { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: #238636; color: white; }
  .tabs { display: flex; background: #161b22; border-bottom: 1px solid #30363d; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: #8b949e; border-bottom: 2px solid transparent; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .tab:hover { color: #c9d1d9; }
  .container { flex: 1; overflow: hidden; }

  /* Zalo Control Panel */
  .zalo-panel { padding: 16px; }
  .section { margin-bottom: 20px; }
  .section h3 { font-size: 14px; color: #8b949e; margin-bottom: 10px; }
  .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-group input, .input-group textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #e0e0e0; font-size: 13px; }
  .input-group textarea { min-height: 60px; resize: vertical; }
  .btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-blue { background: #1f6feb; color: white; }
  .btn-green { background: #238636; color: white; }
  .btn-gray { background: #30363d; color: #c9d1d9; }
  .btn-red { background: #da3633; color: white; }
  .btn:hover { opacity: 0.85; }

  /* Conversations list */
  .conv-list { max-height: 400px; overflow-y: auto; }
  .conv-item { padding: 10px 12px; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background 0.2s; }
  .conv-item:hover { background: #161b22; }
  .conv-name { font-weight: 600; font-size: 13px; }
  .conv-preview { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .conv-time { font-size: 11px; color: #484f58; float: right; }

  /* Messages */
  .msg-list { max-height: 300px; overflow-y: auto; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; }
  .msg { margin-bottom: 8px; }
  .msg .bubble { display: inline-block; padding: 8px 12px; border-radius: 10px; font-size: 13px; max-width: 80%; }
  .msg.inbound .bubble { background: #1c2128; }
  .msg.outbound .bubble { background: #1f6feb; margin-left: auto; display: block; text-align: right; }
  .msg .meta { font-size: 10px; color: #484f58; margin-top: 2px; }

  /* Screenshot */
  .screenshot-container { text-align: center; }
  .screenshot-container img { max-width: 100%; border-radius: 8px; border: 1px solid #30363d; margin-top: 10px; }

  /* Log */
  .log { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; color: #8b949e; }
  .log .entry { margin-bottom: 4px; }
  .log .ok { color: #3fb950; }
  .log .err { color: #f85149; }
</style>
</head>
<body>
<header>
  <h1>Haviz</h1>
  <div class="header-actions">
    <span class="status" id="statusBadge">Connecting...</span>
    <button class="btn btn-gray" onclick="takeScreenshot()">Screenshot</button>
  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('zalo')">Zalo Control</div>
  <div class="tab" onclick="showTab('inbox')">Inbox</div>
  <div class="tab" onclick="showTab('screenshot')">Screenshots</div>
</div>
<div class="container">
  <!-- Zalo Control Tab -->
  <div id="tab-zalo" class="zalo-panel">
    <div class="section">
      <h3>Danh sach hoi thoai</h3>
      <button class="btn btn-blue" onclick="loadZaloConversations()">Refresh</button>
      <div class="conv-list" id="zaloConvList" style="margin-top:10px"></div>
    </div>

    <div class="section">
      <h3>Tim kiem user</h3>
      <div class="input-group">
        <input type="text" id="searchQuery" placeholder="Nhap ten can tim..." onkeydown="if(event.key==='Enter')searchUser()">
        <button class="btn btn-blue" onclick="searchUser()">Tim</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <div class="section">
      <h3>Gui tin nhan (conversation dang mo)</h3>
      <div class="input-group">
        <textarea id="messageText" placeholder="Nhap tin nhan..."></textarea>
      </div>
      <button class="btn btn-green" onclick="sendMessage()">Gui</button>
    </div>

    <div class="section">
      <h3>Log</h3>
      <div class="log" id="log"></div>
    </div>
  </div>

  <!-- Inbox Tab -->
  <div id="tab-inbox" class="zalo-panel" style="display:none">
    <div class="section">
      <h3>Agent Conversations (SQLite)</h3>
      <button class="btn btn-blue" onclick="loadInbox()">Refresh</button>
      <div class="conv-list" id="inboxList" style="margin-top:10px"></div>
    </div>
    <div class="section">
      <h3>Messages</h3>
      <div class="msg-list" id="inboxMessages">Select a conversation above</div>
    </div>
  </div>

  <!-- Screenshot Tab -->
  <div id="tab-screenshot" class="zalo-panel" style="display:none">
    <div class="section">
      <h3>Screenshot</h3>
      <button class="btn btn-blue" onclick="takeScreenshot()">Capture</button>
      <div class="screenshot-container" id="screenshotContainer"></div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:9999/api';

function log(msg, type = 'ok') {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'entry ' + type;
  entry.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  el.prepend(entry);
  if (el.children.length > 50) el.removeChild(el.lastChild);
}

function showTab(name) {
  document.querySelectorAll('.tabs .tab').forEach((t, i) => {
    t.classList.toggle('active', t.textContent.toLowerCase().includes(name));
  });
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
}

async function checkStatus() {
  try {
    const res = await fetch(API + '/status');
    const data = await res.json();
    document.getElementById('statusBadge').textContent = 'Agent v' + data.version;
    document.getElementById('statusBadge').style.background = '#238636';
  } catch {
    document.getElementById('statusBadge').textContent = 'Offline';
    document.getElementById('statusBadge').style.background = '#da3633';
  }
}

async function loadZaloConversations() {
  log('Loading Zalo conversations...');
  try {
    const res = await fetch(API + '/zalo/conversations');
    const data = await res.json();
    const list = document.getElementById('zaloConvList');

    if (data.conversations && data.conversations.length > 0) {
      list.innerHTML = data.conversations
        .filter(c => c.name && c.name.trim())
        .map((c, i) => `
          <div class="conv-item" onclick="openConv(${i + 1})">
            <div class="conv-name">
              ${i + 1}. ${esc(c.name)}
              <span class="conv-time">${esc(c.time || '')}</span>
            </div>
            <div class="conv-preview">${esc(c.sender ? c.sender + ': ' : '')}${esc(c.preview || '')}</div>
          </div>
        `).join('');
      log(data.conversations.length + ' conversations loaded', 'ok');
    } else {
      list.innerHTML = '<div style="color:#8b949e;padding:10px">No conversations. Is Zalo Web logged in?</div>';
      log('No conversations found', 'err');
    }
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
}

async function searchUser() {
  const query = document.getElementById('searchQuery').value.trim();
  if (!query) return;
  log('Searching: ' + query);
  try {
    const res = await fetch(API + '/zalo/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query}),
    });
    const data = await res.json();
    log('Search sent: ' + query, 'ok');

    if (data.conversations) {
      const el = document.getElementById('searchResults');
      el.innerHTML = data.conversations
        .filter(c => c.name && c.name.trim())
        .map((c, i) => `
          <div class="conv-item" onclick="openConv(${i + 1})">
            <div class="conv-name">${i + 1}. ${esc(c.name)}</div>
            <div class="conv-preview">${esc(c.preview || '')}</div>
          </div>
        `).join('');
    }
  } catch (e) {
    log('Search error: ' + e.message, 'err');
  }
}

async function openConv(index) {
  log('Opening conversation #' + index);
  try {
    const res = await fetch(API + '/zalo/open', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({index}),
    });
    const data = await res.json();
    log('Opened #' + index, 'ok');
  } catch (e) {
    log('Open error: ' + e.message, 'err');
  }
}

async function sendMessage() {
  const msg = document.getElementById('messageText').value.trim();
  if (!msg) return;
  log('Sending: ' + msg.substring(0, 50) + '...');
  try {
    const res = await fetch(API + '/zalo/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg}),
    });
    const data = await res.json();
    log('Sent!', 'ok');
    document.getElementById('messageText').value = '';
  } catch (e) {
    log('Send error: ' + e.message, 'err');
  }
}

async function takeScreenshot() {
  log('Taking screenshot...');
  try {
    const res = await fetch(API + '/screenshot');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const container = document.getElementById('screenshotContainer');
    container.innerHTML = '<img src="' + url + '">';
    showTab('screenshot');
    log('Screenshot captured', 'ok');
  } catch (e) {
    log('Screenshot error: ' + e.message, 'err');
  }
}

async function loadInbox() {
  try {
    const res = await fetch(API + '/conversations');
    const data = await res.json();
    const list = document.getElementById('inboxList');
    if (data.conversations && data.conversations.length > 0) {
      list.innerHTML = data.conversations.map(c => `
        <div class="conv-item" onclick="loadMessages('${c.id}')">
          <div class="conv-name">${esc(c.contact_name)} <span class="conv-time">${formatTime(c.last_message_at)}</span></div>
          <div class="conv-preview">${esc(c.last_message_preview || '')}</div>
        </div>
      `).join('');
    } else {
      list.innerHTML = '<div style="color:#8b949e;padding:10px">No messages in Agent DB yet. Start polling first.</div>';
    }
  } catch (e) { log('Inbox error: ' + e.message, 'err'); }
}

async function loadMessages(convId) {
  const res = await fetch(API + '/conversations/' + convId + '/messages?limit=30');
  const data = await res.json();
  const el = document.getElementById('inboxMessages');
  if (data.messages && data.messages.length) {
    el.innerHTML = data.messages.reverse().map(m => `
      <div class="msg ${m.direction}">
        <div class="bubble">${esc(m.content)}</div>
        <div class="meta">${esc(m.sender_name)} ${m.zalo_timestamp || ''}</div>
      </div>
    `).join('');
    el.scrollTop = el.scrollHeight;
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const mins = Math.round((Date.now() - d) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm';
  if (mins < 1440) return Math.round(mins/60) + 'h';
  return d.toLocaleDateString('vi');
}

// Init
checkStatus();
setInterval(checkStatus, 10000);
loadZaloConversations();
</script>
</body>
</html>
